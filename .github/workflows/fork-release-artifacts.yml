name: Fork release artifacts

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to attach artifacts to
        required: true

permissions:
  contents: write
  packages: write

env:
  RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}
  FEATURES: default-release-binaries tx_v6
  RUSTFLAGS: --cfg zcash_unstable="nu7" --cfg zcash_unstable="zip235" --cfg zcash_unstable="nsm"

jobs:
  linux-x86_64-binary:
    name: Build Linux x86_64 binary
    if: ${{ !startsWith(github.event.release.tag_name || inputs.tag, 'v4.5.0-jsonl-traces') }}
    runs-on: ubuntu-22.04
    timeout-minutes: 210
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd #v4.0.0

      - name: Build Ubuntu-compatible binary
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f #v7.1.0
        with:
          context: .
          file: docker/ubuntu-package.Dockerfile
          target: artifact
          platforms: linux/amd64
          outputs: type=local,dest=dist
          build-args: |
            FEATURES=${{ env.FEATURES }}
            RUSTFLAGS=${{ env.RUSTFLAGS }}

      - name: Package binary
        env:
          ARCHIVE: zebra-${{ env.RELEASE_TAG }}-x86_64-unknown-linux-gnu.tar.gz
        run: |
          install -D -m 0755 dist/zebra package/zebra
          tar -C package -czf "${ARCHIVE}" zebra
          sha256sum "${ARCHIVE}" > "${ARCHIVE}.sha256"

      - name: Upload binary to release
        env:
          GH_TOKEN: ${{ github.token }}
          ARCHIVE: zebra-${{ env.RELEASE_TAG }}-x86_64-unknown-linux-gnu.tar.gz
        run: |
          gh release upload "${RELEASE_TAG}" "${ARCHIVE}" "${ARCHIVE}.sha256" --clobber

  linux-x86_64-container:
    name: Build Linux x86_64 container
    if: ${{ !startsWith(github.event.release.tag_name || inputs.tag, 'v4.5.0-jsonl-traces') }}
    runs-on: ubuntu-22.04
    timeout-minutes: 210
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          persist-credentials: false

      - name: Set lowercase image name
        id: image
        run: |
          echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf #v6.0.0
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=${{ env.RELEASE_TAG }}
            type=raw,value=latest,enable=${{ github.event_name == 'release' && !github.event.release.prerelease }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 #v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd #v4.0.0

      - name: Build and push container
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f #v7.1.0
        with:
          context: .
          file: docker/Dockerfile
          target: runtime
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            SHORT_SHA=
            FEATURES=${{ env.FEATURES }}
            RUSTFLAGS=${{ env.RUSTFLAGS }}
